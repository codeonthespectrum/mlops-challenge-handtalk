<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MLOps Pipeline - Architecture Diagram</title>
<style>
body { font-family: sans-serif; background: #fff; display: flex; justify-content: center; padding: 20px; }
</style>
</head>
<body>
<svg width="700" viewBox="0 0 680 720">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text x="340" y="30" text-anchor="middle" font-size="16" font-weight="500" fill="#2C2C2A">MLOps pipeline — EN→PT translation</text>

<!-- CI/CD -->
<rect x="40" y="50" width="600" height="56" rx="12" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="340" y="72" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">CI/CD (GitHub Actions)</text>
<text x="340" y="90" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">Push/PR → Lint → Test → Build → Publish (GHCR)</text>

<!-- n8n container -->
<rect x="40" y="130" width="600" height="210" rx="16" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="60" y="155" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">n8n orchestrator</text>
<text x="200" y="155" dominant-baseline="central" font-size="12" fill="#534AB7">webhook trigger</text>

<!-- Pipeline steps -->
<rect x="60" y="175" width="100" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="110" y="197" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Prepare</text>

<line x1="160" y1="197" x2="180" y2="197" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="182" y="175" width="100" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="232" y="197" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Train</text>

<line x1="282" y1="197" x2="302" y2="197" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="304" y="175" width="100" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="354" y="197" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">Validate</text>

<line x1="404" y1="197" x2="424" y2="197" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="426" y="175" width="100" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="476" y="197" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Publish</text>

<line x1="526" y1="197" x2="546" y2="197" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="548" y="175" width="80" height="44" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text x="588" y="197" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#27500A">Deploy</text>

<!-- Artifacts -->
<rect x="170" y="250" width="140" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="240" y="265" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">data/processed/</text>
<text x="240" y="283" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">TFRecords</text>

<rect x="370" y="250" width="140" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="440" y="265" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">artifacts/run_id/</text>
<text x="440" y="283" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">SavedModel</text>

<!-- Deploy arrow to API -->
<line x1="588" y1="219" x2="588" y2="360" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>

<text x="340" y="375" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Serving</text>

<!-- Client -->
<rect x="40" y="395" width="100" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="90" y="417" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">Client</text>
<line x1="140" y1="417" x2="198" y2="417" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Gateway -->
<rect x="200" y="395" width="130" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="265" y="410" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">NGINX gateway</text>
<text x="265" y="428" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">Auth, rate limit</text>
<line x1="330" y1="417" x2="388" y2="417" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- API -->
<rect x="390" y="395" width="130" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="455" y="410" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">FastAPI</text>
<text x="455" y="428" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">:8000</text>

<!-- Endpoints -->
<rect x="550" y="395" width="90" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="595" y="410" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">/predict</text>
<text x="595" y="428" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">/health /metrics</text>
<line x1="520" y1="417" x2="548" y2="417" stroke="#5F5E5A" stroke-width="0.5"/>

<text x="340" y="490" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Observability</text>

<!-- Arrow API to Prometheus -->
<line x1="455" y1="439" x2="455" y2="510" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>
<text x="468" y="480" dominant-baseline="central" font-size="12" fill="#5F5E5A">/metrics</text>

<!-- Prometheus -->
<rect x="370" y="510" width="160" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="450" y="530" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">Prometheus</text>
<text x="450" y="550" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">Scrape every 15s</text>
<line x1="450" y1="566" x2="450" y2="600" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Grafana -->
<rect x="370" y="600" width="160" height="44" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
<text x="450" y="622" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#72243E">Grafana :3000</text>

<!-- Logs -->
<rect x="140" y="510" width="160" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="220" y="530" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">Docker logs</text>
<text x="220" y="550" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">Structured JSON</text>

<!-- Health -->
<rect x="140" y="600" width="160" height="44" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text x="220" y="622" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#27500A">Health checks</text>

<text x="340" y="690" text-anchor="middle" font-size="12" fill="#888780">MLOps Challenge — Hand Talk</text>
</svg>
</body>
</html>
