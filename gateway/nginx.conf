events {
    worker_connections 1024;
}

http {
    # --- LOGGING ---
    log_format custom '$remote_addr - $http_x_api_key [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log custom;

    # --- RATE LIMITING ---
    limit_req_zone $http_x_api_key zone=api_limit:10m rate=10r/s;

    server {
        listen 80;

        # --- AUTENTICAÇÃO ---
        location / {
            if ($http_x_api_key = "") {
                return 401 '{"error": "API key required"}';
            }
            if ($http_x_api_key != "handtalk-secret-key-2026") {
                return 403 '{"error": "Invalid API key"}';
            }

            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}